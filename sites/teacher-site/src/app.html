<!doctype html>
<html lang="en" data-site="teacher">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.ico" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, maximum-scale=1"
		/>

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<!-- Body Fonts: Use swap for immediate readability -->
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
			rel="stylesheet"
		/>
		<!-- Heading Fonts: Use block to prevent jarring layout shifts -->
		<link
			href="https://fonts.googleapis.com/css2?family=Passion+One:wght@400;700;900&family=Special+Elite&display=block"
			rel="stylesheet"
		/>

		<style>
			:root {
				--nord0: #2e3440;
				--nord4: #d8dee9;
				--bg: var(--nord0);
				--fg: var(--nord4);
			}
			:root[data-theme='light'] {
				--bg: var(--nord4);
				--fg: var(--nord0);
			}
			body {
				background-color: var(--bg);
				color: var(--fg);
				margin: 0;
				font-family: 'Inter', sans-serif;
			}
		</style>

		<script>
			;(function () {
				try {
					// 1. Get the preference, default to 'system' if nothing is stored
					const theme = localStorage.getItem('theme') || 'system'
					const isSystemLight = window.matchMedia(
						'(prefers-color-scheme: light)'
					).matches

					// 2. Resolve the actual theme to apply
					let resolved = 'dark'
					if (theme === 'light') {
						resolved = 'light'
					} else if (theme === 'system' && isSystemLight) {
						resolved = 'light'
					}

					// 3. Apply immediately to prevent the blinding white void
					document.documentElement.setAttribute('data-theme', resolved)
					document.documentElement.style.colorScheme = resolved
				} catch (e) {
					// Fallback if localStorage or mediaMatch is unavailable
					document.documentElement.setAttribute('data-theme', 'dark')
				}
			})()
		</script>

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
