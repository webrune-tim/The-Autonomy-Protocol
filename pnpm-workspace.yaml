packages:
  - "sites/*"
  - "packages/**"

allowBuilds:
  "@prisma/client": true
  better-sqlite3: false
  esbuild: true
  sharp: true

catalog:
  "@img/sharp-darwin-arm64": ^0.34.5
  "@img/sharp-libvips-darwin-arm64": ^1.2.4
  "@lucide/svelte": ^1.17.0
  "@types/canvas-confetti": ^1.9.0
  "@types/node": ^25.0.0
  "@typescript/native-preview": 7.0.0-dev.20260421.2
  "@vitest/browser-playwright": ^4.1.7
  canvas-confetti: ^1.9.4
  install: ^0.13.0
  node-addon-api: ^8.8.0
  sharp: ^0.34.5
  stylelint: ^17.12.0
  stylelint-config-standard: ^40.0.0
  sv-agentation: ^0.2.6
  typescript: ^5.0.0
  # Standard stable versions:
  vite: ^8.0.14
  vitest: ^3.0.0

catalogMode: prefer

# 'overrides' are removed so that dependencies resolve normally 
# based on their versions in package.json or the catalog.

peerDependencyRules:
  # Removed the blanket allowAny for vite/vitest 
  # to encourage standard version alignment.
  allowedVersions:
    vite: "^8.0.14"
    vitest: "^3.0.0"