packages:
  - "sites/*"
  # The recursive wildcard (**) allows pnpm to find nested packages
  # like packages/core/actions or packages/content/four-agreements
  - "packages/**"

allowBuilds:
  "@prisma/client": true
  better-sqlite3: false
  esbuild: true
  sharp: true

catalog:
  "@img/sharp-darwin-arm64": ^0.34.5
  "@img/sharp-libvips-darwin-arm64": ^1.2.4
  "@lucide/svelte": ^1.17.0
  "@types/canvas-confetti": ^1.9.0
  "@types/node": ^25
  "@typescript/native-preview": 7.0.0-dev.20260421.2
  "@vitest/browser-playwright": ^4.1.7
  canvas-confetti: ^1.9.4
  install: ^0.13.0
  node-addon-api: ^8.8.0
  sharp: ^0.34.5
  stylelint: ^17.12.0
  stylelint-config-standard: ^40.0.0
  sv-agentation: ^0.2.6
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: ^0.1.22
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.19

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
