packages:
  - sites/*
  - packages/**
  - tools/*
  - docs/*
allowBuilds:
  esbuild: true
  sharp: true

catalog:
  "@img/sharp-darwin-arm64": ^0.34.5
  "@img/sharp-libvips-darwin-arm64": ^1.2.4
  "@types/node": ^24
  sharp: ^0.34.5
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
