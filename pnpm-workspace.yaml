packages:
  - "sites/*"
  - "packages/**"

allowBuilds:
  "@prisma/client": true
  better-sqlite3: false
  esbuild: true
  sharp: true

catalog:
  "@better-auth/infra": ^0.2.14
  "@lucide/svelte": ^1.18.0
  "@sveltejs/enhanced-img": ^0.10.4
  "@types/canvas-confetti": ^1.9.0
  "@types/node": ^25.9.3
  "@typescript/native-preview": 7.0.0-dev.20260421.2
  canvas-confetti: ^1.9.4
  install: ^0.13.0
  motion: ^12.40.0
  node-addon-api: ^8.8.0
  sharp: ^0.34.5
  stylelint: ^17.13.0
  stylelint-config-standard: ^40.0.0
  sv-agentation: ^0.2.6
  typescript: ^5.9.3
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest
  vite-plus: ^0.1.24
  mdsvex: ^0.12.7
  "@libsql/linux-x64-gnu": ^0.5.29
  dotenv: ^17.4.2
  "@sveltejs/kit": ^2.65.0
  turbo: ^2.9.18

catalogMode: prefer

peerDependencyRules:
  allowedVersions:
    vite: "*"
    vitest: "*"
  allowAny:
    - vite
    - vitest
overrides:
  vite: "catalog:"
  vitest: "catalog:"
